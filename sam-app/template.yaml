AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: "0shared backend — Lambda + API Gateway"

Parameters:
  DynamoDBTableName:
    Type: String
    Description: Name of the DynamoDB table created by Terraform
  FilesBucketName:
    Type: String
    Description: Name of the S3 bucket for user files created by Terraform
  InterfaceLambdaName:
    Type: String
    Description: Name of the download interface Lambda created by Terraform

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 128
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref DynamoDBTableName
        FILES_BUCKET: !Ref FilesBucketName
        INTERFACE_LAMBDA_NAME: !Ref InterfaceLambdaName
    LoggingConfig:
      LogFormat: JSON
      ApplicationLogLevel: INFO
      SystemLogLevel: WARN

Resources:
  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: health.lambdaHandler
      Events:
        HealthApi:
          Type: Api
          Properties:
            Path: /api/health
            Method: GET
      Policies:
        - CloudWatchPutMetricPolicy: {}
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDBTableName
        - S3ReadPolicy:
            BucketName: !Ref FilesBucketName

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: auth.lambdaHandler
      Events:
        Signup:
          Type: Api
          Properties:
            Path: /api/auth/signup
            Method: POST
        Login:
          Type: Api
          Properties:
            Path: /api/auth/login
            Method: POST
        Logout:
          Type: Api
          Properties:
            Path: /api/auth/logout
            Method: POST
        Me:
          Type: Api
          Properties:
            Path: /api/auth/me
            Method: GET
      Policies:
        - CloudWatchPutMetricPolicy: {}
        - DynamoDBCrudPolicy:
            TableName: !Ref DynamoDBTableName

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: upload.lambdaHandler
      Events:
        UploadApi:
          Type: Api
          Properties:
            Path: /api/upload
            Method: POST
        UploadInitiateApi:
          Type: Api
          Properties:
            Path: /api/upload/initiate
            Method: POST
        UploadCompleteApi:
          Type: Api
          Properties:
            Path: /api/upload/complete
            Method: POST
      Policies:
        - CloudWatchPutMetricPolicy: {}
        - S3CrudPolicy:
            BucketName: !Ref FilesBucketName
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDBTableName

  DownloadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/handlers/
      Handler: download.lambdaHandler
      Events:
        DownloadApi:
          Type: Api
          Properties:
            Path: /api/download/{fileId}
            Method: GET
      Policies:
        - CloudWatchPutMetricPolicy: {}
        - S3ReadPolicy:
            BucketName: !Ref FilesBucketName
        - DynamoDBReadPolicy:
            TableName: !Ref DynamoDBTableName
        - LambdaInvokePolicy:
            FunctionName: !Ref InterfaceLambdaName

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL (Prod stage)"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod"
    Export:
      Name: app-0shared-backend-ApiEndpoint
